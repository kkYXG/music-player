<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>热歌播放器</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 使用系统字体，无需加载外部资源 -->
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-icon">🎵</div>
                <h1>热歌播放器</h1>
                <p>抖音最火歌曲，一网打尽</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">登 录</button>
                <div class="form-footer">
                    <span>还没有账号？</span>
                    <a href="#" id="showRegister">立即注册</a>
                </div>
            </form>
            <form id="registerForm" class="login-form hidden">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="regUsername" placeholder="设置用户名" required>
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPassword" placeholder="设置密码（至少6位）" required minlength="6">
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPasswordConfirm" placeholder="确认密码" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">注 册</button>
                <div class="form-footer">
                    <span>已有账号？</span>
                    <a href="#" id="showLogin">返回登录</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 主播放页 -->
    <div id="mainPage" class="page">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <span class="header-greeting" id="greeting">Hi，用户</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="favFilterBtn" title="我的收藏">
                    <span class="heart-icon" id="heartIcon">♡</span>
                </button>
                <button class="header-btn" id="logoutBtn" title="退出登录">
                    ⏻
                </button>
            </div>
        </header>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索歌曲或歌手...">
        </div>

        <!-- 当前播放器 -->
        <div class="now-playing" id="nowPlaying">
            <div class="album-art" id="albumArt">
                <div class="album-disc spinning" id="albumDisc">
                    <div class="disc-inner">
                        <div class="disc-hole"></div>
                    </div>
                </div>
                <div class="album-visualizer" id="visualizer">
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                </div>
            </div>
            <div class="song-info">
                <h3 id="currentSongName">选择一首歌曲开始播放</h3>
                <p id="currentArtist">--</p>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <div class="progress-time">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="shuffleBtn" title="随机播放">🔀</button>
                <button class="control-btn" id="prevBtn" title="上一首">⏮</button>
                <button class="control-btn play-btn" id="playBtn" title="播放">▶</button>
                <button class="control-btn" id="nextBtn" title="下一首">⏭</button>
                <button class="control-btn" id="repeatBtn" title="循环模式">🔁</button>
            </div>
        </div>

        <!-- 歌曲列表 -->
        <div class="playlist-section">
            <div class="section-header">
                <h2 id="listTitle">🔥 抖音热歌榜</h2>
                <span class="song-count" id="songCount">0首</span>
            </div>
            <div class="playlist" id="playlist">
                <!-- 歌曲列表动态生成 -->
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script src="js/app.js"></script>
</body>
</html>
